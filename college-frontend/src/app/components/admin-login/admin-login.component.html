<div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-sm">
  <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Admin Login</h2>

  <!-- Username -->
  <div>
    <label class="block text-gray-600 font-semibold mb-1">Username</label>
    <input type="text" [(ngModel)]="username" class="w-full p-2 border rounded" placeholder="Enter Username"
      (keyup.enter)="login()">
  </div>

  <!-- Password with Toggle -->
  <div class="mt-4">
    <label class="block text-gray-600 font-semibold mb-1">Password</label>
    <div class="relative">
      <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password"
        class="w-full p-2 border rounded" style="padding-right: 2.5rem;"
        placeholder="Enter Password" (keyup.enter)="login()">
      <span (click)="togglePassword()"
        class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-gray-600 select-none"
        title="Show / hide password">
        {{ showPassword ? '🙈' : '👁️' }}
      </span>
    </div>
  </div>

  <!-- Error -->
  @if (loginError) {
  <p class="text-red-500 text-sm mt-3">
    Invalid username or password!
  </p>
  }

  <!-- Login Button -->
  <button (click)="login()" [disabled]="loading"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 mt-6 rounded cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed">
    {{ loading ? 'Logging in...' : 'Login' }}
  </button>
</div>
